<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta http-equiv="Content-Security-Policy" content="default-src 'self' data: blob: https:; script-src 'self' 'unsafe-inline' https://unpkg.com https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://unpkg.com; img-src 'self' data: blob: https:; connect-src 'self' https:; worker-src 'self' blob: https:; font-src 'self' data: https:;" />
<title>PlotRanker</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
:root{--bg:#0b1020;--panel:#121a2d;--panel2:#17223a;--text:#eef4ff;--muted:#9fb0cd;--blue:#69a6ff;--green:#78df97;--red:#ff7a7a;--line:#263453;--gold:#f6c85f}
*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at top,#162443,#0b1020 45%);color:var(--text);font-family:Inter,ui-sans-serif,system-ui,-apple-system,sans-serif;min-height:100vh}.app{display:grid;grid-template-columns:255px 1fr;min-height:100vh}.side{padding:26px 20px;border-right:1px solid var(--line);background:rgba(8,13,25,.9);position:sticky;top:0;height:100vh}.brand{font-size:22px;font-weight:800;margin-bottom:8px}.sub{color:var(--muted);font-size:13px;line-height:1.45}.steps{margin-top:28px;display:grid;gap:9px}.step{padding:12px;border-radius:12px;color:#8999b7;border:1px solid transparent}.step.active{color:white;background:var(--panel2);border-color:#365384}.step.done{color:#9de9b2}.main{padding:34px;max-width:1380px;width:100%;margin:auto}.card{background:rgba(18,26,45,.95);border:1px solid var(--line);border-radius:20px;padding:24px;box-shadow:0 18px 55px rgba(0,0,0,.24)}h1{font-size:34px;margin:0 0 10px}h2{margin:0 0 12px}.lead{color:var(--muted);font-size:17px;line-height:1.55}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:18px}.field{display:grid;gap:7px}label{font-size:13px;color:#b8c6df;font-weight:700}input,select{width:100%;background:#0c1425;color:white;border:1px solid #314363;border-radius:12px;padding:13px 14px;font-size:15px}.btn{border:0;border-radius:12px;padding:13px 18px;font-weight:800;font-size:15px;cursor:pointer}.primary{background:linear-gradient(135deg,#5d8fff,#79b3ff);color:#061021}.secondary{background:#1b2943;color:white;border:1px solid #385078}.danger{background:#4a232c;color:#ffd9df}.row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}.space{justify-content:space-between}.notice{padding:14px 16px;border:1px solid #365078;background:#101b30;border-radius:12px;color:#cbd8ee;line-height:1.5}.ok{border-color:#2d7b48;background:#10291a}.warn{border-color:#8f6a2c;background:#2d2511}.drop{border:2px dashed #48618d;border-radius:18px;padding:40px;text-align:center;background:#0c1528}.drop input{max-width:520px}.preview{margin-top:18px;background:#080c16;border:1px solid var(--line);border-radius:14px;overflow:auto;max-height:520px}.preview canvas{display:block;max-width:100%;height:auto;margin:auto}.progress{height:14px;background:#0a1222;border-radius:99px;overflow:hidden;border:1px solid #273955}.bar{height:100%;width:0;background:linear-gradient(90deg,#5c89ff,#76df9a);transition:width .35s}.missions{display:grid;gap:9px;margin-top:18px}.mission{display:flex;justify-content:space-between;padding:12px 14px;background:#0e1729;border-radius:12px;color:#b9c7de}.mission.done{color:#97e8ad}.workspace{display:grid;grid-template-columns:1fr 1fr;gap:16px}.pane{background:#080d18;border:1px solid var(--line);border-radius:15px;overflow:hidden;position:relative;min-height:580px}.pane canvas{display:block;max-width:100%;height:auto;margin:auto}.map{height:580px}.toolbar{padding:12px;background:#111a2c;border-bottom:1px solid var(--line);display:flex;gap:8px;flex-wrap:wrap}.badge{padding:6px 10px;border-radius:99px;background:#1c2c49;color:#cfe0ff;font-size:12px}.ranking{display:grid;gap:12px}.rank{display:grid;grid-template-columns:56px 1fr 84px;gap:14px;align-items:center;padding:16px;border-radius:14px;background:#101a2d;border:1px solid #293b5c}.rankno{font-size:25px;font-weight:900;color:#75a9ff}.score{font-size:24px;font-weight:900;text-align:right}.small{font-size:12px;color:var(--muted)}.hidden{display:none!important}.music{position:fixed;right:18px;bottom:18px;z-index:2000;background:#17243d;color:white;border:1px solid #365078;padding:11px 14px;border-radius:99px;cursor:pointer}.leaflet-container{background:#0a0f19}.overlay-img{position:absolute;left:0;top:0;transform-origin:0 0;pointer-events:none;opacity:.55;mix-blend-mode:multiply}.question{font-size:21px;line-height:1.4}.metric{display:grid;grid-template-columns:150px 1fr 45px;gap:10px;align-items:center}.metric input{padding:0}.plot-marker{position:absolute;width:18px;height:18px;margin:-9px;border-radius:50%;background:#72e092;border:3px solid #07130b;box-shadow:0 0 0 3px white;pointer-events:none}.plot-label{position:absolute;background:#07130b;color:#caffd5;padding:3px 6px;border-radius:7px;font-weight:800;font-size:12px;transform:translate(10px,-26px);pointer-events:none}@media(max-width:980px){.app{grid-template-columns:1fr}.side{display:none}.workspace,.grid{grid-template-columns:1fr}.main{padding:18px}.pane,.map{min-height:480px;height:480px}}
</style>
</head>
<body>
<button class="music" id="music">♫ Music off</button>
<div class="app"><aside class="side"><div class="brand">PlotRanker</div><div class="sub">Local planning alignment and transparent ranking. No invented plot IDs or fake geolocation.</div><div class="steps" id="steps"></div></aside><main class="main" id="screen"></main></div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script type="module">
import * as pdfjsLib from 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.10.38/pdf.min.mjs';
pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.10.38/pdf.worker.min.mjs';
window.pdfjsLib=pdfjsLib;
</script>
<script>
const $=id=>document.getElementById(id);
const stages=['Welcome','Upload plan','Location','Analysis','Align plan','Mark plots','Priorities','Ranking'];
const S={stage:0,name:'',country:'Israel',countryCode:'il',file:null,image:null,imageURL:'',w:0,h:0,city:'',region:'',location:null,roundabouts:[],planPts:[],mapPts:[],plotMarks:[],markMode:false,map:null,overlay:null,priorities:{quiet:80,privacy:75,access:55,greenery:65,size:45},music:null};
function renderSteps(){ $('steps').innerHTML=stages.map((x,i)=>`<div class="step ${i===S.stage?'active':''} ${i<S.stage?'done':''}">${i+1}. ${x}</div>`).join('') }
function go(n){S.stage=n;renderSteps();render()}
function card(inner){return `<div class="card">${inner}</div>`}
function render(){if(S.stage===0)return welcome();if(S.stage===1)return upload();if(S.stage===2)return locationStage();if(S.stage===3)return analysis();if(S.stage===4)return align();if(S.stage===5)return markPlots();if(S.stage===6)return priorities();return ranking()}
function welcome(){ $('screen').innerHTML=card(`<h1>Start a plot analysis</h1><p class="lead">This version does one stable job: open a plan, place it on the correct map location, let you confirm the plots, and rank them using visible rules.</p><div class="grid"><div class="field"><label>Your name</label><input id="name" value="${S.name}" placeholder="Name"></div><div class="field"><label>Project country</label><select id="country"><option>Israel</option><option>United States</option><option>United Kingdom</option><option>France</option><option>Italy</option><option>Norway</option><option>Other</option></select></div></div><div class="row space" style="margin-top:22px"><span class="small">Nothing is uploaded to PlotRanker servers.</span><button class="btn primary" id="next">Continue</button></div>`);$('country').value=S.country;$('next').onclick=()=>{S.name=$('name').value.trim()||'User';S.country=$('country').value;S.countryCode={Israel:'il','United States':'us','United Kingdom':'gb',France:'fr',Italy:'it',Norway:'no'}[S.country]||'';go(1)}}
function upload(){ $('screen').innerHTML=card(`<h1>Upload plan</h1><p class="lead">PDFs automatically use professional planning mode. Images remain images.</p><div class="drop"><input id="file" type="file" accept="application/pdf,image/png,image/jpeg,image/webp"><p class="small">PDF, PNG, JPEG or WebP</p></div><div id="preview" class="preview ${S.image?'':'hidden'}"><canvas id="previewCanvas"></canvas></div><div id="fileStatus" class="notice ${S.image?'ok':''}" style="margin-top:15px">${S.image?`Loaded ${S.file.name} · ${S.w}×${S.h}`:'Choose a file.'}</div><div class="row space" style="margin-top:22px"><button class="btn secondary" id="back">Back</button><button class="btn primary" id="next" ${S.image?'':'disabled'}>Continue</button></div>`);if(S.image)drawPreview();$('file').onchange=async e=>{const f=e.target.files[0];if(!f)return;try{await loadFile(f);upload()}catch(err){$('fileStatus').textContent='Could not open file: '+err.message;$('fileStatus').className='notice warn'}};$('back').onclick=()=>go(0);$('next').onclick=()=>go(2)}
async function loadFile(file){S.file=file;if(S.imageURL)URL.revokeObjectURL(S.imageURL);if(file.type==='application/pdf'||file.name.toLowerCase().endsWith('.pdf')){const bytes=new Uint8Array(await file.arrayBuffer());const pdf=await window.pdfjsLib.getDocument({data:bytes}).promise;const page=await pdf.getPage(1);const viewport=page.getViewport({scale:2});const c=document.createElement('canvas');c.width=Math.ceil(viewport.width);c.height=Math.ceil(viewport.height);await page.render({canvasContext:c.getContext('2d'),viewport}).promise;S.imageURL=c.toDataURL('image/png')}else S.imageURL=URL.createObjectURL(file);S.image=await createImageBitmap(await (await fetch(S.imageURL)).blob());S.w=S.image.width;S.h=S.image.height}
function drawPreview(){const c=$('previewCanvas');if(!c)return;const scale=Math.min(1,1100/S.w);c.width=Math.round(S.w*scale);c.height=Math.round(S.h*scale);c.getContext('2d').drawImage(S.image,0,0,c.width,c.height)}
function locationStage(){ $('screen').innerHTML=card(`<h1>Location</h1><p class="lead">Enter the real locality. The app will not call it “matched” until you confirm the plan against the map.</p><div class="grid"><div class="field"><label>City, kibbutz, town or village</label><input id="city" value="${S.city}" placeholder="Example: Tzora"></div><div class="field"><label>Region or council (optional)</label><input id="region" value="${S.region}" placeholder="Optional"></div></div><div class="row space" style="margin-top:22px"><button class="btn secondary" id="back">Back</button><button class="btn primary" id="next">Search locality</button></div>`);$('back').onclick=()=>go(1);$('next').onclick=()=>{S.city=$('city').value.trim();S.region=$('region').value.trim();if(!S.city){$('city').focus();return}go(3)}}
async function analysis(){ $('screen').innerHTML=card(`<h1>Analysis</h1><p class="lead">This is real progress, not a fake delay.</p><div class="progress"><div class="bar" id="bar"></div></div><div class="missions" id="missions"></div>`);const tasks=['Validate plan image','Prepare local plan canvas','Search the chosen locality','Download mapped roundabouts','Prepare alignment workspace'];const done=[];const paint=()=>{$('missions').innerHTML=tasks.map((t,i)=>`<div class="mission ${i<done.length?'done':''}"><span>${t}</span><strong>${i<done.length?'Complete':i===done.length?'Working…':'Waiting'}</strong></div>`);$('bar').style.width=`${done.length/tasks.length*100}%`};paint();await wait(350);done.push(1);paint();await wait(300);done.push(1);paint();const q=[S.city,S.region,S.country].filter(Boolean).join(', ');const geo=await window.plotranker.geocode(q,S.countryCode);if(!geo.ok||!geo.results?.length){$('screen').innerHTML=card(`<h1>Location not found</h1><div class="notice warn">${geo.error||'No result'}. Go back and use a more specific locality.</div><button class="btn secondary" id="back" style="margin-top:18px">Back</button>`);$('back').onclick=()=>go(2);return}S.location=geo.results[0];done.push(1);paint();const ro=await window.plotranker.roundabouts(+S.location.lat,+S.location.lon,6000);S.roundabouts=ro.results||[];done.push(1);paint();await wait(300);done.push(1);paint();await wait(450);go(4)}
const wait=ms=>new Promise(r=>setTimeout(r,ms));
function align(){ $('screen').innerHTML=card(`<h1>Align plan</h1><p class="lead">Use two matching points. First choose the roundabout or strongest junction on the plan and map. Then choose a second road bend or junction. This determines position, scale and rotation.</p><div class="notice ${S.roundabouts.length?'ok':'warn'}">Map centred on <strong>${S.location.display_name}</strong>. Found ${S.roundabouts.length} mapped roundabout candidate${S.roundabouts.length===1?'':'s'} nearby.</div><div class="workspace" style="margin-top:16px"><div class="pane"><div class="toolbar"><span class="badge" id="instruction">${alignInstruction()}</span><button class="btn secondary" id="undo">Undo point</button></div><canvas id="planCanvas"></canvas></div><div class="pane"><div id="map" class="map"></div></div></div><div class="row space" style="margin-top:16px"><button class="btn secondary" id="back">Back</button><button class="btn primary" id="next" ${aligned()?'':'disabled'}>Continue to plots</button></div>`);drawPlanCanvas();setTimeout(initMap,50);$('back').onclick=()=>go(2);$('undo').onclick=()=>{if(S.mapPts.length>S.planPts.length-1)S.mapPts.pop();else S.planPts.pop();align()};$('next').onclick=()=>go(5)}
function aligned(){return S.planPts.length===2&&S.mapPts.length===2}
function alignInstruction(){if(S.planPts.length===0)return'Click the roundabout/junction on the plan';if(S.mapPts.length===0)return'Click the same point on the map';if(S.planPts.length===1)return'Click a second road point on the plan';if(S.mapPts.length===1)return'Click the same second point on the map';return'Alignment complete'}
function drawPlanCanvas(){const c=$('planCanvas'),max=700,scale=Math.min(max/S.w,560/S.h,1);c.width=Math.round(S.w*scale);c.height=Math.round(S.h*scale);c.dataset.scale=scale;const x=c.getContext('2d');x.drawImage(S.image,0,0,c.width,c.height);for(const [i,p] of S.planPts.entries()){x.beginPath();x.arc(p.x*scale,p.y*scale,10,0,Math.PI*2);x.fillStyle=i?'#69a6ff':'#ff765f';x.fill();x.strokeStyle='white';x.lineWidth=3;x.stroke()}c.onclick=e=>{if(S.planPts.length>=2||S.planPts.length>S.mapPts.length)return;const r=c.getBoundingClientRect(),sx=c.width/r.width,sy=c.height/r.height;S.planPts.push({x:(e.clientX-r.left)*sx/scale,y:(e.clientY-r.top)*sy/scale});align()}}
function initMap(){const loc=[+S.location.lat,+S.location.lon];S.map=L.map('map').setView(loc,16);L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{maxZoom:20,attribution:'Esri'}).addTo(S.map);L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:20,opacity:.36,attribution:'OpenStreetMap'}).addTo(S.map);S.roundabouts.forEach((r,i)=>L.circleMarker([r.lat,r.lon],{radius:8,color:'#f6c85f',weight:3,fillOpacity:.25}).addTo(S.map).bindTooltip(`Roundabout candidate ${i+1}`));S.mapPts.forEach((p,i)=>L.circleMarker(p,{radius:9,color:i?'#69a6ff':'#ff765f',weight:4,fillOpacity:.5}).addTo(S.map));S.map.on('click',e=>{if(S.mapPts.length>=2||S.mapPts.length>=S.planPts.length)return;S.mapPts.push([e.latlng.lat,e.latlng.lng]);align()});if(aligned())installOverlay()}
function installOverlay(){const map=S.map,img=document.createElement('img');img.src=S.imageURL;img.className='overlay-img';img.style.width=`${S.w}px`;img.style.height=`${S.h}px`;map.getPanes().overlayPane.appendChild(img);S.overlay=img;const update=()=>{const q0=map.latLngToLayerPoint(S.mapPts[0]),q1=map.latLngToLayerPoint(S.mapPts[1]),p0=S.planPts[0],p1=S.planPts[1];const pdx=p1.x-p0.x,pdy=p1.y-p0.y,qdx=q1.x-q0.x,qdy=q1.y-q0.y;const ps=Math.hypot(pdx,pdy)||1,qs=Math.hypot(qdx,qdy)||1,s=qs/ps,a=Math.atan2(qdy,qdx)-Math.atan2(pdy,pdx),ca=Math.cos(a)*s,sa=Math.sin(a)*s,e=q0.x-(ca*p0.x-sa*p0.y),f=q0.y-(sa*p0.x+ca*p0.y);img.style.transform=`matrix(${ca},${sa},${-sa},${ca},${e},${f})`};map.on('zoom move',update);update()}
function markPlots(){ $('screen').innerHTML=card(`<h1>Mark plots</h1><p class="lead">Enter the ID printed on the plan, then click the centre of that actual plot. Nothing is auto-filled.</p><div class="grid"><div class="field"><label>Plot ID</label><input id="plotId" placeholder="Example: 356"></div><div class="field"><label>Marked</label><div class="notice ok">${S.plotMarks.length} plot${S.plotMarks.length===1?'':'s'}</div></div></div><div class="row" style="margin:14px 0"><button class="btn primary" id="mark">Mark this plot</button><button class="btn secondary" id="undo">Undo last</button></div><div class="pane" id="plotPane"><canvas id="plotCanvas"></canvas><div id="markers"></div></div><div class="row space" style="margin-top:16px"><button class="btn secondary" id="back">Back</button><button class="btn primary" id="next" ${S.plotMarks.length?'':'disabled'}>Set priorities</button></div>`);drawPlotCanvas();$('mark').onclick=()=>{const id=$('plotId').value.trim();if(!id)return;$('mark').textContent='Click its centre now';S.markMode=id};$('undo').onclick=()=>{S.plotMarks.pop();markPlots()};$('back').onclick=()=>go(4);$('next').onclick=()=>go(6)}
function drawPlotCanvas(){const c=$('plotCanvas'),max=1050,scale=Math.min(max/S.w,650/S.h,1);c.width=Math.round(S.w*scale);c.height=Math.round(S.h*scale);c.dataset.scale=scale;c.getContext('2d').drawImage(S.image,0,0,c.width,c.height);c.onclick=e=>{if(!S.markMode)return;const r=c.getBoundingClientRect(),sx=c.width/r.width,sy=c.height/r.height;S.plotMarks.push({id:S.markMode,x:(e.clientX-r.left)*sx/scale,y:(e.clientY-r.top)*sy/scale});S.markMode=false;markPlots()};const markers=$('markers');for(const p of S.plotMarks){const m=document.createElement('div');m.className='plot-marker';m.style.left=`${p.x*scale}px`;m.style.top=`${p.y*scale}px`;const l=document.createElement('div');l.className='plot-label';l.textContent=p.id;m.appendChild(l);markers.appendChild(m)}}
function priorities(){const defs=[['quiet','Quietness'],['privacy','Privacy'],['access','Easy access'],['greenery','Greenery'],['size','Plot size']];$('screen').innerHTML=card(`<h1>Priorities</h1><p class="lead">These weights change the final order. The evidence remains visible.</p>${defs.map(([k,n])=>`<div class="metric"><label>${n}</label><input id="${k}" type="range" min="0" max="100" value="${S.priorities[k]}"><strong id="${k}v">${S.priorities[k]}</strong></div>`).join('')}<div class="row space" style="margin-top:22px"><button class="btn secondary" id="back">Back</button><button class="btn primary" id="next">Rank plots</button></div>`);for(const [k] of defs){$(k).oninput=e=>{$(k+'v').textContent=e.target.value;S.priorities[k]=+e.target.value}}$('back').onclick=()=>go(5);$('next').onclick=()=>go(7)}
function rankEvidence(){const rp=S.planPts[0]||{x:S.w/2,y:S.h/2};const maxDist=Math.max(...S.plotMarks.map(p=>Math.hypot(p.x-rp.x,p.y-rp.y)),1);return S.plotMarks.map((p,i)=>{const d=Math.hypot(p.x-rp.x,p.y-rp.y),roundabout=Math.max(0,100*(1-d/(Math.hypot(S.w,S.h)*.38)));let pass=0;const pa=Math.atan2(p.y-rp.y,p.x-rp.x);for(const q of S.plotMarks){if(q===p)continue;const qd=Math.hypot(q.x-rp.x,q.y-rp.y),qa=Math.atan2(q.y-rp.y,q.x-rp.x);let ad=Math.abs(pa-qa);ad=Math.min(ad,Math.PI*2-ad);if(qd>d&&ad<.45)pass+=1}const flow=Math.min(100,pass/Math.max(1,S.plotMarks.length-1)*150);const quiet=Math.round(Math.max(10,96-roundabout*.48-flow*.38));const privacy=Math.round(Math.max(20,82-roundabout*.2-flow*.28));const access=Math.round(Math.min(96,46+roundabout*.3+flow*.18));const greenery=50;const size=50;const W=S.priorities,total=Object.values(W).reduce((a,b)=>a+b,0)||1;const score=Math.round((quiet*W.quiet+privacy*W.privacy+access*W.access+greenery*W.greenery+size*W.size)/total);const reasons=[];if(roundabout>55)reasons.push('close to the confirmed circulation node');if(flow>30)reasons.push('traffic serving plots farther along the same route may pass nearby');if(roundabout<25)reasons.push('farther from the main roundabout/junction');if(!reasons.length)reasons.push('mixed circulation exposure');return{...p,score,quiet,privacy,access,greenery,size,roundabout:Math.round(roundabout),flow:Math.round(flow),reason:reasons.join('; ')}}).sort((a,b)=>b.score-a.score)}
function ranking(){const rs=rankEvidence();$('screen').innerHTML=card(`<h1>Ranking</h1><p class="lead">This is a transparent screening result, not a legal or acoustic conclusion.</p><div class="notice warn">Quietness uses only the confirmed circulation point and relative plot positions. Greenery and size stay neutral at 50 until you provide real boundaries or data.</div><div class="ranking" style="margin-top:18px">${rs.map((r,i)=>`<div class="rank"><div class="rankno">#${i+1}</div><div><h3 style="margin:0 0 5px">Plot ${r.id}</h3><div>${r.reason}</div><div class="small">Quiet ${r.quiet} · Privacy ${r.privacy} · Access ${r.access} · Roundabout influence ${r.roundabout} · Estimated passing flow ${r.flow}</div></div><div class="score">${r.score}</div></div>`).join('')}</div><div class="row space" style="margin-top:20px"><button class="btn secondary" id="back">Back</button><button class="btn primary" id="restart">New project</button></div>`);$('back').onclick=()=>go(6);$('restart').onclick=()=>location.reload()}
function startMusic(){if(S.music)return;const A=window.AudioContext||window.webkitAudioContext,c=new A(),master=c.createGain();master.gain.value=.12;master.connect(c.destination);let stopped=false,step=0,timer;const notes=[110,146.83,164.81,196,220,246.94,293.66,329.63];function tone(f,t,d=.55,v=.08,type='triangle'){const o=c.createOscillator(),g=c.createGain();o.type=type;o.frequency.value=f;g.gain.setValueAtTime(.0001,t);g.gain.exponentialRampToValueAtTime(v,t+.025);g.gain.exponentialRampToValueAtTime(.0001,t+d);o.connect(g);g.connect(master);o.start(t);o.stop(t+d+.05)}function loop(){if(stopped)return;const now=c.currentTime+.05;for(let i=0;i<8;i++){const t=now+i*.36,tone(notes[(step+i*3)%notes.length],t,.55,.065);if(i%4===0)tone(notes[(step+i)%4]/2,t,1.2,.06,'sine')}step=(step+5)%notes.length;timer=setTimeout(loop,2700)}loop();S.music={stop(){stopped=true;clearTimeout(timer);c.close()}};$('music').textContent='♫ Music on'}
$('music').onclick=()=>{if(S.music){S.music.stop();S.music=null;$('music').textContent='♫ Music off'}else startMusic()};renderSteps();render();
</script>
</body></html>
